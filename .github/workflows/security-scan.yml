name: Security Scan

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.filter.outputs.workflows }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            scripts:
              - 'scripts/**'

  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          url="$(
            python3 - <<'PY'
import json
import urllib.request

with urllib.request.urlopen("https://api.github.com/repos/gitleaks/gitleaks/releases/latest") as response:
    release = json.load(response)

for asset in release["assets"]:
    url = asset["browser_download_url"]
    if ("linux_x64" in url or "linux_amd64" in url) and url.endswith(".tar.gz"):
        print(url)
        break
else:
    raise SystemExit("no Linux Gitleaks tarball found")
PY
          )"
          curl -sSfL "${url}" -o /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gitleaks
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks
          chmod +x /tmp/gitleaks/gitleaks
          /tmp/gitleaks/gitleaks version

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          /tmp/gitleaks/gitleaks detect --source . --no-git --redact --verbose

  workflow-lint:
    name: GitHub Actions lint
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          url="$(
            python3 - <<'PY'
import json
import urllib.request

with urllib.request.urlopen("https://api.github.com/repos/rhysd/actionlint/releases/latest") as response:
    release = json.load(response)

for asset in release["assets"]:
    url = asset["browser_download_url"]
    if "linux_amd64" in url and url.endswith(".tar.gz"):
        print(url)
        break
else:
    raise SystemExit("no Linux actionlint tarball found")
PY
          )"
          curl -sSfL "${url}" -o /tmp/actionlint.tar.gz
          mkdir -p /tmp/actionlint
          tar -xzf /tmp/actionlint.tar.gz -C /tmp/actionlint
          chmod +x /tmp/actionlint/actionlint
          /tmp/actionlint/actionlint -version

      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          /tmp/actionlint/actionlint -color

  workflow-security:
    name: GitHub Actions security scan
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zizmor
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run zizmor advisory scan
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          zizmor .github/workflows

  shell-lint:
    name: Shell script lint
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          shellcheck scripts/*.sh
