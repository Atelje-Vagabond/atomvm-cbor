name: PR Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signoff:
    name: DCO sign-off check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Signed-off-by trailers
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            commits=$(git rev-list "${base}..${head}")
          else
            commits=$(git rev-list -1 HEAD)
          fi

          if [ -z "${commits}" ]; then
            echo "No commits to check."
            exit 0
          fi

          failed=0
          for commit in ${commits}; do
            echo "Checking ${commit}"
            if git log -1 --format=%B "${commit}" | grep -Eq '^Signed-off-by: .+ <[^<>[:space:]]+>$'; then
              echo "  PASS: Signed-off-by trailer present"
            else
              echo "  FAIL: missing valid Signed-off-by trailer"
              failed=1
            fi
          done

          exit "${failed}"

  public-clean:
    name: Public repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject non-public files and markers
        shell: bash
        run: |
          set -euo pipefail

          forbidden_paths='(^|/)\.agent(/|$)|(^|/)\.opencode(/|$)|(^|/)AGENTS\.md$|(^|/)CLAUDE\.md$|(^|/)GEMINI\.md$|(^|/)\.cursor(/|$)|copilot-instructions\.md$'

          if find . -path ./.git -prune -o -print | grep -E "${forbidden_paths}"; then
            echo "FAIL: forbidden non-public file path found."
            exit 1
          fi

          if grep -RInE '\.agent|\.opencode|AGENTS\.md|CLAUDE\.md|GEMINI\.md|HANDOFF|BOOTSTRAP|ACTIVE_TASK|NEXT_ACTION|DO_NOT_BREAK|office-state|runtime-state|internal orchestration|private prompt' . \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude=README.md \
            --exclude=CONTRIBUTING.md \
            --exclude=CODE_OF_CONDUCT.md; then
            echo "FAIL: forbidden non-public marker found in exported files."
            exit 1
          fi

          echo "PASS: public hygiene check passed."

  basic:
    name: Basic repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: 27

      - name: Check required public project files
        shell: bash
        run: |
          set -euo pipefail
          version="v$(cat VERSION)"
          test -s README.md
          test -s CHANGELOG.md
          test -s VERSION
          test -s LICENSE
          test -s docs/api.md
          test -s docs/benchmarks.md
          test -s "docs/benchmarks/${version}.md"
          test -s scripts/bench.sh
          test -s scripts/gen-api-docs.py
          test -s scripts/release-check.sh
          test -s scripts/test-esp-idf.sh
          test -s scripts/local-pre-push-check.sh
          test -s scripts/install-git-hooks.sh

      - name: Check shell syntax
        shell: bash
        run: |
          set -euo pipefail
          sh -n scripts/bench.sh
          sh -n scripts/release-check.sh
          sh -n scripts/test-esp-idf.sh
          sh -n scripts/local-pre-push-check.sh
          sh -n scripts/install-git-hooks.sh
          python3 -m py_compile scripts/gen-api-docs.py

      - name: Check generated API docs
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/gen-api-docs.py --check

      - name: Compile and run CBOR smoke test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/avm_cbor_test
          erlc -o /tmp/avm_cbor_test src/avm_cbor.erl
          erlc -o /tmp/avm_cbor_test -pa /tmp/avm_cbor_test test/avm_cbor_smoke.erl
          erl -noshell -pa /tmp/avm_cbor_test -eval 'avm_cbor_smoke:run().'

  atomvm:
    name: AtomVM validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: 25

      - name: Download AtomVM binary and lib
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/atomvm
          curl -sL -o /tmp/atomvm/atomvm \
            "https://github.com/atomvm/AtomVM/releases/download/v0.6.6/AtomVM-linux-x86_64-static-mbedtls-v0.6.6"
          curl -sL -o /tmp/atomvm/atomvmlib.avm \
            "https://github.com/atomvm/AtomVM/releases/download/v0.6.6/atomvmlib-v0.6.6.avm"
          chmod +x /tmp/atomvm/atomvm

      - name: Compile and run AtomVM test
        shell: bash
        run: |
          set -euo pipefail
          erlc -o /tmp src/avm_cbor.erl
          erlc -o /tmp test/avm_cbor_atomvm.erl
          /tmp/atomvm/atomvm /tmp/avm_cbor.beam /tmp/avm_cbor_atomvm.beam /tmp/atomvm/atomvmlib.avm
