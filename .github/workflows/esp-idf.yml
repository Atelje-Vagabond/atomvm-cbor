name: ESP-IDF Validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to validate. Leave empty to use VERSION.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  esp-idf:
    name: Manual ESP-IDF build validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: 27

      - name: Verify Docker is available
        shell: bash
        run: |
          set -euo pipefail
          docker --version

      - name: Run release check with ESP-IDF validation
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if [ -z "${version}" ]; then
            version="v$(cat VERSION)"
          fi
          sh scripts/release-check.sh "${version}" --with-esp-idf
